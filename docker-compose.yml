services:
  mysql:
    image: mysql:8.4
    container_name: foodnexus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - foodnexus_mysql_data:/var/lib/mysql
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 24

  keycloak:
    image: keycloak/keycloak:latest
    container_name: foodnexus-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
      # Issuer JWT stable pour Spring (localhost:8080) — recréer le volume Keycloak si vous changez cela.
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_STRICT: false
    ports:
      - "8080:8080"
    command:
      - start-dev
      - --import-realm
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-init.json:/opt/keycloak/data/import/realm.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  keycloak_data:
  foodnexus_mysql_data:
