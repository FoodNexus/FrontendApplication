<div class="container text-center mt-5">
  <div class="card shadow p-5 border-0 rounded-4">
    <h1 class="display-4 text-success fw-bold mb-4">NutriFlow <span class="text-secondary fw-light">Hub</span></h1>
    <p class="lead text-muted mb-5">Bienvenue sur la plateforme de test. Connectez-vous avec votre
      <strong>Email</strong> pour accéder à votre espace dédié.</p>

    <div class="row justify-content-center">
      <div class="d-grid gap-3 mb-4">
        <button class="btn btn-success btn-lg shadow-sm py-3 fw-bold" (click)="login()">
          <i class="bi bi-box-arrow-in-right me-2"></i> Se connecter
        </button>

        <button class="btn btn-outline-primary btn-lg shadow-sm py-3 fw-bold" (click)="register()">
          <i class="bi bi-person-plus me-2"></i> Créer un compte
        </button>
      </div>

      <div class="alert alert-danger mt-4" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <p class="small text-muted mt-4 mb-0">
        Session Keycloak bloquée (« autre utilisateur déjà connecté ») ?
        <button type="button" class="btn btn-link btn-sm p-0 align-baseline" (click)="forceKeycloakLogout()">
          Forcer la déconnexion Keycloak
        </button>
      </p>
    </div>
  </div>
</div>
