<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-7">

      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">
            <i class="bi bi-file-earmark-plus me-2"></i>
            Nouveau Contrat Numérique
          </h5>
        </div>

        <div class="card-body">

          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>

          <form [formGroup]="form" (ngSubmit)="submit()">

            <!-- Delivery ID -->
            <div class="mb-3">
              <label class="form-label fw-bold">Delivery ID *</label>
              <input type="number" formControlName="deliveryId"
                     class="form-control" placeholder="ID de la livraison"/>
              <div *ngIf="form.get('deliveryId')?.invalid && 
                          form.get('deliveryId')?.touched"
                   class="text-danger small">Obligatoire</div>
            </div>

            <!-- Donor ID -->
            <div class="mb-3">
              <label class="form-label fw-bold">Donor ID *</label>
              <input type="number" formControlName="donorId"
                     class="form-control" placeholder="ID du donateur"/>
              <div *ngIf="form.get('donorId')?.invalid && 
                          form.get('donorId')?.touched"
                   class="text-danger small">Obligatoire</div>
            </div>

            <!-- Receiver ID -->
            <div class="mb-3">
              <label class="form-label fw-bold">Receiver ID *</label>
              <input type="number" formControlName="receiverId"
                     class="form-control" placeholder="ID du receveur"/>
              <div *ngIf="form.get('receiverId')?.invalid && 
                          form.get('receiverId')?.touched"
                   class="text-danger small">Obligatoire</div>
            </div>

            <!-- Valeur fiscale -->
            <div class="mb-3">
              <label class="form-label fw-bold">
                Valeur de déduction fiscale (TND) *
              </label>
              <input type="number" formControlName="fiscalDeductionValue"
                     class="form-control" placeholder="Ex: 250.00"
                     step="0.01"/>
              <div *ngIf="form.get('fiscalDeductionValue')?.invalid && 
                          form.get('fiscalDeductionValue')?.touched"
                   class="text-danger small">Obligatoire</div>
            </div>

            <!-- Boutons -->
            <div class="d-flex gap-2 justify-content-end mt-4">
              <button type="button" (click)="cancel()"
                      class="btn btn-outline-secondary">
                Annuler
              </button>
              <button type="submit"
                      [disabled]="form.invalid || loading"
                      class="btn btn-primary">
                <span *ngIf="loading"
                      class="spinner-border spinner-border-sm me-1">
                </span>
                Créer le Contrat
              </button>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
